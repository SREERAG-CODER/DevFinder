<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFinder — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
/* ── PROFILE SPECIFIC ── */
.profile-wrap{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
  padding:28px;
  position:relative;z-index:2;
  height:100%;overflow-y:auto;
}
.profile-wrap::-webkit-scrollbar{width:4px}
.profile-wrap::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:2px}

/* LEFT CARD */
.profile-left{display:flex;flex-direction:column;gap:16px}

.avatar-card{
  background:var(--white);
  border:var(--border);border-radius:20px;
  box-shadow:5px 5px 0 var(--black);
  padding:28px 24px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  text-align:center;
}
.avatar-wrap{position:relative;width:100px;height:100px}
.big-avatar{
  width:100px;height:100px;border-radius:50%;
  border:var(--border);
  background:var(--yellow);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:42px;
  color:var(--black);overflow:hidden;
  box-shadow:4px 4px 0 var(--black);
}
.big-avatar img{width:100%;height:100%;object-fit:cover}
.avatar-upload-btn{
  position:absolute;bottom:0;right:0;
  width:28px;height:28px;border-radius:50%;
  background:var(--pink);border:2px solid var(--black);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--white);font-size:11px;
  box-shadow:2px 2px 0 var(--black);
}
#avatar-input{display:none}

.profile-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:.5px;color:var(--black);line-height:1;
}
.profile-email{font-size:12px;color:#888;font-weight:500}
.profile-since{
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:#aaa;
}

.edit-btn{
  width:100%;padding:11px;
  background:var(--black);color:var(--white);
  border:var(--border);border-radius:100px;
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .2s;
  box-shadow:3px 3px 0 #333;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.edit-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #333}
.edit-btn.active{background:var(--green);color:var(--black);box-shadow:3px 3px 0 var(--black)}

/* LINKS CARD */
.links-card{
  background:var(--white);
  border:var(--border);border-radius:20px;
  box-shadow:5px 5px 0 var(--black);
  padding:20px;
}
.links-title{
  font-size:9px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;color:#aaa;margin-bottom:14px;
}
.link-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1.5px solid #f0f0f0;
}
.link-row:last-child{border-bottom:none}
.link-icon{
  width:34px;height:34px;border-radius:8px;
  border:2px solid var(--black);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--black);flex-shrink:0;
}
.link-info{flex:1;overflow:hidden}
.link-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#aaa}
.link-val{
  font-size:12px;font-weight:600;color:var(--black);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-decoration:none;
}
.link-val:hover{color:var(--green2)}
.link-val.empty{color:#ccc;font-weight:400}

/* RIGHT SIDE */
.profile-right{display:flex;flex-direction:column;gap:16px}

.info-card{
  background:var(--white);
  border:var(--border);border-radius:20px;
  box-shadow:5px 5px 0 var(--black);
  padding:24px;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.card-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:.5px;color:var(--black);
}

/* VIEW MODE */
.view-row{margin-bottom:14px}
.view-row:last-child{margin-bottom:0}
.vr-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:4px}
.vr-val{font-size:14px;font-weight:500;color:var(--black);line-height:1.6}
.vr-val.empty{color:#ccc;font-style:italic;font-weight:400}

/* EDIT MODE */
.edit-mode{display:none}
.edit-mode.show{display:block}
.view-mode.hide{display:none}

.efield{margin-bottom:14px}
.efield label{display:block;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--black);margin-bottom:6px}
.efield input,.efield textarea{
  width:100%;padding:11px 14px;
  border:var(--border);border-radius:12px;
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  color:var(--dark);background:var(--white);outline:none;
  transition:box-shadow .2s;
}
.efield input:focus,.efield textarea:focus{box-shadow:3px 3px 0 var(--black)}
.efield textarea{resize:vertical;min-height:80px}

/* SKILLS CHIPS */
.skills-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.skill-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--yellow);border:2px solid var(--black);
  border-radius:100px;padding:5px 12px;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  box-shadow:2px 2px 0 var(--black);
}
.skill-chip button{
  background:none;border:none;cursor:pointer;
  color:var(--black);font-size:10px;padding:0;
  display:flex;align-items:center;
}
.skill-chip.view-chip button{display:none}
.skill-input-wrap{display:flex;gap:8px}
.skill-input-wrap input{
  flex:1;padding:10px 14px;
  border:var(--border);border-radius:100px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;
  color:var(--dark);outline:none;
}
.skill-add-btn{
  padding:10px 16px;
  background:var(--black);color:var(--white);
  border:var(--border);border-radius:100px;
  font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:2px 2px 0 #333;
}

/* SAVE ROW */
.save-row{display:flex;gap:10px;margin-top:4px}
.save-btn{
  flex:1;padding:12px;
  background:var(--green);color:var(--black);
  border:var(--border);border-radius:100px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:800;letter-spacing:1.5px;
  cursor:pointer;box-shadow:3px 3px 0 var(--black);
  transition:all .2s;
}
.save-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--black)}
.cancel-btn{
  padding:12px 20px;
  background:var(--white);color:var(--black);
  border:var(--border);border-radius:100px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;
  cursor:pointer;
}

/* HOSTED TEAMS */
.hosted-grid{display:flex;flex-direction:column;gap:12px}
.hosted-card{
  display:flex;align-items:center;gap:14px;
  background:var(--white);border:var(--border);
  border-radius:14px;padding:14px 16px;
  box-shadow:3px 3px 0 var(--black);
  transition:transform .15s,box-shadow .15s;
}
.hosted-card:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--black)}
.hosted-icon{
  width:44px;height:44px;border-radius:10px;
  background:var(--yellow);border:2px solid var(--black);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--black);flex-shrink:0;
}
.hosted-info{flex:1}
.hosted-name{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--black);letter-spacing:.3px}
.hosted-meta{font-size:10px;color:#888;font-weight:600;margin-top:2px}
.hosted-badge{
  background:var(--green);border:2px solid var(--black);
  border-radius:100px;padding:4px 10px;
  font-size:9px;font-weight:800;letter-spacing:1px;
  color:var(--black);
}
.empty-hosted{
  text-align:center;padding:32px;
  color:#bbb;font-size:13px;font-weight:500;
}
.empty-hosted i{font-size:32px;display:block;margin-bottom:10px;color:#ddd}

/* SUCCESS TOAST */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--black);color:var(--white);
  border:var(--border);border-radius:14px;
  padding:14px 20px;font-size:13px;font-weight:600;
  box-shadow:4px 4px 0 #333;z-index:999;
  display:flex;align-items:center;gap:10px;
  transform:translateY(80px);opacity:0;
  transition:all .3s ease;
}
.toast.show{transform:translateY(0);opacity:1}
.toast i{color:var(--green);font-size:16px}

/* ── APPLICANTS MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.6);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--white);border:var(--border);
  border-radius:24px;padding:32px;
  width:600px;max-width:95vw;
  box-shadow:8px 8px 0 var(--black);
  position:relative;max-height:85vh;overflow-y:auto;
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:.5px;
  color:var(--black);margin-bottom:20px;
}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:34px;height:34px;border-radius:50%;
  background:var(--black);border:none;
  color:var(--white);font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.applicant-list{display:flex;flex-direction:column;gap:12px}
.applicant-card{
  background:#f9f9f9;border:2px solid var(--black);
  border-radius:14px;padding:16px;
  display:flex;flex-direction:column;gap:10px;
}
.applicant-head{display:flex;justify-content:space-between;align-items:flex-start}
.applicant-name{font-weight:700;font-size:16px;color:var(--black)}
.applicant-role-badge{
  background:var(--yellow);border:1.5px solid var(--black);
  border-radius:100px;padding:2px 10px;
  font-size:9px;font-weight:800;text-transform:uppercase;
}
.applicant-msg{font-size:13px;color:#444;line-height:1.5;background:white;padding:10px;border-radius:8px;border:1px dashed #ccc}
.applicant-actions{display:flex;gap:10px}
.action-btn{
  flex:1;padding:10px;border:2px solid var(--black);
  border-radius:100px;font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:800;cursor:pointer;
  transition:all .2s;
}
.accept-btn{background:var(--green);color:var(--black)}
.reject-btn{background:var(--red);color:var(--white)}
.status-badge{
  font-size:11px;font-weight:800;text-transform:uppercase;
  padding:4px 12px;border-radius:100px;border:2px solid var(--black);
}
.status-accepted{background:var(--green2);color:white}
.status-rejected{background:var(--red2);color:white}
.hosted-card .view-applicants-btn{
  margin-left:auto;background:var(--black);color:white;
  border:none;padding:6px 12px;border-radius:8px;
  font-size:10px;font-weight:700;cursor:pointer;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <div class="user-name" id="sidebar-name">LOADING...</div>
      <div class="user-role">Member</div>
    </div>
  </div>

  <div class="nav-section">
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-house"></i> Dashboard
    </a>
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-users"></i> My Teams
    </a>
    <a class="nav-item" href="dashboard.html">
      <i class="fa-solid fa-list-check"></i> My Hosted
    </a>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-section" style="padding-top:0">
    <a class="nav-item active" href="profile.html">
      <i class="fa-solid fa-circle-user"></i> Profile
    </a>
    <div class="nav-item">
      <i class="fa-solid fa-gear"></i> Settings
    </div>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-section" style="padding-top:0">
    <div class="nav-item danger" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Log Out
    </div>
  </div>

  <div class="sidebar-bottom">
    <div class="sidebar-logo">DevFinder</div>
    <div class="sidebar-since">Since 2026</div>
  </div>
</aside>

<button class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()">
  <i class="fa-solid fa-chevron-left" id="collapse-icon"></i>
</button>

<!-- MAIN -->
<div class="main" id="main">
  <div class="bg-wrap">
    <div class="bg-yellow"></div>
    <div class="bg-pink"></div>
    <div class="bg-green"></div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search Teams, Events, User">
    </div>
    <button class="host-btn" onclick="window.location.href='dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i> BACK
    </button>
    <button class="icon-btn"><i class="fa-solid fa-bell"></i></button>
    <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
  </div>

  <!-- PROFILE CONTENT -->
  <div class="profile-wrap">

    <!-- LEFT -->
    <div class="profile-left">

      <!-- Avatar Card -->
      <div class="avatar-card">
        <div class="avatar-wrap">
          <div class="big-avatar" id="big-avatar">?</div>
          <label class="avatar-upload-btn" for="avatar-input" title="Upload photo">
            <i class="fa-solid fa-camera"></i>
          </label>
          <input type="file" id="avatar-input" accept="image/*">
        </div>
        <div>
          <div class="profile-name" id="p-name">Loading...</div>
          <div class="profile-email" id="p-email">loading@email.com</div>
          <div class="profile-since" id="p-since">Member since —</div>
        </div>
        <button class="edit-btn" id="edit-toggle-btn" onclick="toggleEdit()">
          <i class="fa-solid fa-pen" id="edit-btn-icon"></i>
          <span id="edit-btn-label">EDIT PROFILE</span>
        </button>
      </div>

      <!-- Links Card -->
      <div class="links-card">
        <div class="links-title">Links</div>
        <div class="link-row">
          <div class="link-icon"><i class="fa-brands fa-github"></i></div>
          <div class="link-info">
            <div class="link-label">GitHub</div>
            <a class="link-val" id="p-github" href="#" target="_blank">Not added</a>
          </div>
        </div>
        <div class="link-row">
          <div class="link-icon"><i class="fa-brands fa-linkedin"></i></div>
          <div class="link-info">
            <div class="link-label">LinkedIn</div>
            <a class="link-val" id="p-linkedin" href="#" target="_blank">Not added</a>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="profile-right">

      <!-- Info Card -->
      <div class="info-card">
        <div class="card-head">
          <div class="card-label">About</div>
        </div>

        <!-- VIEW MODE -->
        <div class="view-mode" id="view-mode">
          <div class="view-row">
            <div class="vr-label">Full Name</div>
            <div class="vr-val" id="v-name">—</div>
          </div>
          <div class="view-row">
            <div class="vr-label">Bio</div>
            <div class="vr-val" id="v-bio">—</div>
          </div>
          <div class="view-row">
            <div class="vr-label">Skills</div>
            <div class="skills-wrap" id="v-skills"></div>
          </div>
        </div>

        <!-- EDIT MODE -->
        <div class="edit-mode" id="edit-mode">
          <div class="efield">
            <label>Full Name</label>
            <input type="text" id="e-name" placeholder="Your full name">
          </div>
          <div class="efield">
            <label>Bio</label>
            <textarea id="e-bio" placeholder="Tell the community about yourself..."></textarea>
          </div>
          <div class="efield">
            <label>GitHub URL</label>
            <input type="text" id="e-github" placeholder="https://github.com/username">
          </div>
          <div class="efield">
            <label>LinkedIn URL</label>
            <input type="text" id="e-linkedin" placeholder="https://linkedin.com/in/username">
          </div>
          <div class="efield">
            <label>Skills</label>
            <div class="skills-wrap" id="e-skills"></div>
            <div class="skill-input-wrap">
              <input type="text" id="skill-input" placeholder="e.g. React, Python..." onkeydown="skillKeydown(event)">
              <button class="skill-add-btn" onclick="addSkill()">
                <i class="fa-solid fa-plus"></i> Add
              </button>
            </div>
          </div>
          <div class="save-row">
            <button class="save-btn" onclick="saveProfile()">
              <i class="fa-solid fa-check"></i> SAVE CHANGES
            </button>
            <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
          </div>
          <div id="save-error" style="color:var(--red);font-size:12px;font-weight:600;margin-top:8px;display:none"></div>
        </div>
      </div>

      <!-- Hosted Teams Card -->
      <div class="info-card">
        <div class="card-head">
          <div class="card-label">My Hosted Teams</div>
        </div>
        <div class="hosted-grid" id="hosted-grid">
          <div class="empty-hosted">
            <i class="fa-solid fa-layer-group"></i>
            No hosted teams yet
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check"></i>
  <span id="toast-msg">Profile updated!</span>
</div>

<!-- APPLICANTS MODAL -->
<div class="modal-overlay" id="applicants-modal">
  <div class="modal">
    <div class="modal-title" id="m-team-name">APPLICANTS</div>
    <button class="modal-close" onclick="closeApplicantsModal()">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <div class="applicant-list" id="applicant-list">
      <!-- Applicants will be rendered here -->
    </div>
  </div>
</div>

<script src="profile.js"></script>
</body>
</html>
