<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFinder — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <div class="user-name" id="sidebar-name">LOADING...</div>
      <div class="user-role">Member</div>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-item active" onclick="setActive(this)">
      <i class="fa-solid fa-house"></i> Dashboard
    </div>
    <div class="nav-item" onclick="setActive(this)">
      <i class="fa-solid fa-users"></i> My Teams
    </div>
    <div class="nav-item" onclick="setActive(this)">
      <i class="fa-solid fa-list-check"></i> My Hosted
    </div>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-section" style="padding-top:0">
    <a class="nav-item" href="profile.html">
      <i class="fa-solid fa-circle-user"></i> Profile
    </a>
    <div class="nav-item" onclick="setActive(this)">
      <i class="fa-solid fa-gear"></i> Settings
    </div>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-section" style="padding-top:0">
    <div class="nav-item danger" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Log Out
    </div>
  </div>

  <div class="sidebar-bottom">
    <div class="sidebar-logo">DevFinder</div>
    <div class="sidebar-since">Since 2026</div>
  </div>
</aside>

<button class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()">
  <i class="fa-solid fa-chevron-left" id="collapse-icon"></i>
</button>

<div class="main" id="main">
  <div class="bg-wrap">
    <div class="bg-yellow"></div>
    <div class="bg-pink"></div>
    <div class="bg-green"></div>
  </div>

  <div class="topbar">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search Teams, Events, User" id="search-input">
    </div>
    <button class="host-btn" onclick="openModal()">
      <i class="fa-solid fa-plus"></i> HOST TEAM
    </button>
    <button class="icon-btn" onclick="window.location.href='profile.html'">
      <i class="fa-solid fa-user"></i>
    </button>
    <button class="icon-btn"><i class="fa-solid fa-bell"></i></button>
    <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
  </div>

  <div class="content">
    <div class="hostspace-title">H<span class="o">O</span>STSPACE</div>
    <div class="cards-row" id="cards-row"></div>
  </div>
</div>

<!-- HOST MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">HOST A TEAM</div>
    <button class="modal-close" onclick="closeModal()">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="field">
      <label>Team / Hackathon Name</label>
      <input type="text" id="f-name" placeholder="e.g. GreenHack 2026">
    </div>
    <div class="field">
      <label>Hosted By</label>
      <input type="text" id="f-by" placeholder="Organisation or your name">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="What are you building?"></textarea>
    </div>
    <div class="field">
      <label>Tech Stack</label>
      <input type="text" id="f-tech" placeholder="e.g. React, Node.js, PostgreSQL">
    </div>
    <div class="field">
      <label>Team Size</label>
      <input type="number" id="f-size" min="2" max="10" value="4">
    </div>
    <div class="field">
      <label>Deadline</label>
      <input type="date" id="f-deadline">
    </div>
    <div class="field">
      <label>Roles Needed</label>
      <div class="roles-builder" id="roles-builder">
        <div class="role-input-row">
          <input type="text" placeholder="e.g. UI/UX Designer">
          <button onclick="removeRole(this)"><i class="fa-solid fa-minus"></i></button>
        </div>
      </div>
      <button class="add-role-btn" onclick="addRole()">
        <i class="fa-solid fa-plus"></i> Add Role
      </button>
    </div>

    <div id="modal-error"></div>
    <button class="submit-btn" onclick="submitHost()">CREATE TEAM</button>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
