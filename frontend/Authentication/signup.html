<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFinder — Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">

        <!-- LEFT SIDE -->
        <div class="left-section">
            <img src="hackathon-bg.png" alt="Hackathon Illustration">
        </div>

        <!-- RIGHT SIDE -->
        <div class="right-section">
            <div class="login-card" id="card">

                <h1>Create<br>Account</h1>
                <p>Join the hackathon community today</p>

                <form id="signup-form">

                    <div class="input-box">
                        <input type="text" id="signup-name" placeholder="Full Name" autocomplete="name" required>
                    </div>

                    <div class="input-box">
                        <input type="email" id="signup-email" placeholder="Email Address" autocomplete="email" required>
                    </div>

                    <div class="input-box password-box">
                        <input type="password" id="signup-password" placeholder="Password" autocomplete="new-password"
                            required>
                        <span class="toggle-password" onclick="togglePassword('signup-password', this)">👁</span>
                    </div>

                    <!-- Password strength bar -->
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <p class="strength-label" id="strength-label"></p>

                    <div class="input-box password-box">
                        <input type="password" id="signup-confirm" placeholder="Confirm Password"
                            autocomplete="new-password" required>
                        <span class="toggle-password" onclick="togglePassword('signup-confirm', this)">👁</span>
                    </div>

                    <p class="error-msg" id="error-msg"></p>

                    <button class="login-btn" type="submit" id="signup-btn">Create Account</button>

                </form>

                <div class="divider">OR</div>

                <div class="social-icons">
                    <button class="social-btn google" type="button" onclick="socialComingSoon()">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="20"> Google
                    </button>
                    <button class="social-btn github" type="button" onclick="socialComingSoon()">
                        <img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="GitHub" width="20"> GitHub
                    </button>
                </div>

                <div class="signup-text">
                    Already have an account? <a href="login.html">Login</a>
                </div>

            </div>
        </div>

    </div>

    <script src="signup.js"></script>

</body>

</html>
