<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup Page</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="main-container">

        <!-- LEFT SIDE -->

        <div class="left-section">

            <img src="hackathon-bg.png"
                 alt="Hackathon Illustration">

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-section">

            <div class="login-card">

                <h1>Create<br>Account</h1>

                <p>
                    Join the hackathon community today
                </p>

                <form>

                    <div class="input-box">

                        <input type="text"
                               placeholder="Full Name"
                               required>

                    </div>

                    <div class="input-box">

                        <input type="email"
                               placeholder="Email Address"
                               required>

                    </div>

                    <div class="input-box">

                        <input type="text"
                               placeholder="Username"
                               required>

                    </div>

                    <div class="input-box">

                        <input type="password"
                               placeholder="Password"
                               required>

                    </div>

                    <div class="input-box">

                        <input type="password"
                               placeholder="Confirm Password"
                               required>

                    </div>

                    <button class="login-btn">

                        Create Account

                    </button>

                </form>

                <div class="divider">

                    OR

                </div>

                <div class="social-icons">

                    <button>G</button>

                    <button>Git</button>

                    <button>X</button>

                </div>

                <div class="signup-text">

                    Already have an account?

                    <a href="login.html">
                        Login
                    </a>

                </div>

            </div>

        </div>

    </div>

    <script src="signup.js"></script>

</body>

</html>
